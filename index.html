<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Boy's Birthday Celebration</title>
    <style>
        body { background-color: #E0F7FA; color: #000; font-family: 'Arial', sans-serif; }
        .container { text-align: center; padding: 20px; }
        .animated-balloons { position: relative; }
        .gift-box { animation: spin 5s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy Birthday!</h1>
        <div class="animated-balloons">
            <!-- Animated floating balloons code here -->
        </div>
        <div class="gift-box">
            <!-- Spinning 3D gift box code here -->
        </div>
        <div class="mascots">
            <img src="cartoon_bear.png" alt="Cute Cartoon Bear" />
            <img src="cartoon_bunny.png" alt="Cute Cartoon Bunny" />
        </div>
        <h2>Birthday Cake Animation 🎂</h2>
        <div class="confetti">
            <!-- Confetti with emojis code here -->
        </div>
        <div class="stars">
            <!-- Twinkling stars animation code here -->
        </div>
        <div class="music">
            <!-- Musical notes animation code here -->
        </div>
        <form>
            <label for="wishes">Your Birthday Wishes:</label>
            <input type="text" id="wishes" name="wishes" />
            <button type="submit">Send</button>
        </form>
        <div id="wishes-display">
            <!-- Real-time display of wishes code here -->
        </div>
    </div>
</body>
</html>
